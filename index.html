<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Running Routes</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- leaflet-gpx for GPX rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f1115;
      color: #fff;
    }

    header {
     padding: 16px;
      font-size: 20px;
      font-weight: bold;
      background: #151924;
      position: sticky;
      top: 0;
    }
    
    .container {
      padding: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .card {
      background: #1b2130;
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .route-title {
      min-height: 4.8em;
      display: flex;
      align-items: flex-start;
      line-height: 1.6;
      margin: 0;
    }

    .map-thumb {
      height: 120px;
      border-radius: 8px;
      margin-top: 8px;
    }

    #routeView {
      display: none;
    }

    #map {
      height: 60vh;
      border-radius: 12px;
      margin-top: 10px;
    }

    .btn {
      display: inline-block;
      padding: 10px 12px;
      margin-top: 10px;
      background: #2d6cdf;
      color: white;
      border-radius: 8px;
      text-decoration: none;
    }

    .back {
      margin-bottom: 10px;
      display: inline-block;
      cursor: pointer;
      color: #aaa;
    }
/* Upcoming runs layout only */
#scheduleGrid {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

#scheduleGrid .card {
  width: 100%;
  max-width: 640px;
}   
  </style>
</head>
<body>
<header>🏃 RunTogether Heaton</header>
  
<div style="padding:12px 16px; display:flex; gap:10px; background:#151924; border-top:1px solid #222;">
  <button class="btn" onclick="showSection('schedule')">Upcoming Runs</button>
  <button class="btn" onclick="showSection('routes')">Routes</button>
</div>

<!-- ROUTES -->
<div class="container" id="homeView" style="display:none;">

  <div
    style="
      display:flex;
      gap:10px;
      justify-content:center;
      margin-bottom:18px;
      flex-wrap:wrap;
    "
  >
    <button class="btn" onclick="setSeasonFilter('all')">
      All Routes
    </button>

    <button class="btn" onclick="setSeasonFilter('summer')">
      Summer Routes
    </button>

    <button class="btn" onclick="setSeasonFilter('winter')">
      Winter Routes
    </button>
  </div>

  <div class="grid" id="routesGrid"></div>
</div>

<!-- UPCOMING RUNS -->
<div
  class="container"
  id="scheduleView"
>
  <h2>Upcoming Runs</h2>
  <div id="scheduleGrid"></div>
</div>
<div class="container" id="routeView">
  <div class="back" onclick="showHome()">← Back</div>

  <h2 id="routeName"></h2>
  <p id="routeInfo"></p>
  <p id="routeDescription" style="color:#c7cedb; line-height:1.6; max-width:800px;"></p>

  <div id="map"></div>

  <a id="stravaLink" class="btn" target="_blank">Open in Strava</a>
  <a id="gpxDownload" class="btn" download>Download GPX</a>
</div>

<script>
let routes = [];
let scheduledRuns = [];
let previousSection = 'schedule';
let activeSeason = 'all';  

// Replace with your published Google Sheet JSON endpoint
const GOOGLE_SHEET_URL = 'https://opensheet.elk.sh/1_1t3XtoAZ0vagZX1ePSvvAGu9o9S1O85YUoLMCFCkRs/Schedule';
let map;
let gpxLayer;

async function loadRoutes() {
  const res = await fetch('./routes.json');
  routes = await res.json();
  renderGrid();
  loadSchedule();
  showSection('schedule');
}

async function loadSchedule() {
  try {
    const res = await fetch(GOOGLE_SHEET_URL);
    const data = await res.json();

    // Expected columns:
    // date, time, runningGroup, routeId
    scheduledRuns = data;
    renderSchedule();
  } catch (err) {
    console.error('Schedule failed to load', err);
  }
}

function renderSchedule() {
  const grid = document.getElementById('scheduleGrid');
  grid.innerHTML = '';

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const upcoming = scheduledRuns
    .filter(run => {
      const runDate = new Date(run.date);
      runDate.setHours(0, 0, 0, 0);
      return runDate >= today;
    })
    .sort((a, b) => new Date(a.date) - new Date(b.date));

  upcoming.forEach(run => {
    const route = routes.find(
      r => String(r.id) === String(run.routeId)
    );

    const div = document.createElement('div');
    div.className = 'card';

    const formattedDate = new Date(run.date)
      .toLocaleDateString('en-GB', {
        weekday: 'short',
        day: '2-digit',
        month: '2-digit',
        year: 'numeric'
      })
      .replace(',', '');

    div.innerHTML = `
      <div style="font-size:0.9rem; color:#b8c2d1; margin-bottom:8px;">
        ${formattedDate} · ${run.time || ''}
      </div>

      <h3 class="route-title" style="min-height:auto; margin-bottom:6px;">
        ${run.runningGroup || ''}
      </h3>

      ${
        route
          ? `
            <p style="margin:0 0 8px 0; font-weight:600;">
              ${route.name}
            </p>
          `
          : ''
      }

      <p style="margin:0 0 14px 0; color:#9ea8b8;">
        ${run.notes || ''}
      </p>

      ${
        route
          ? `
            <button class="btn view-route-btn" style="margin-top:auto;">
              View Route
            </button>
          `
          : ''
      }
    `;

    // Only attach button if route exists
    if (route) {
      div.querySelector('.view-route-btn')
        .addEventListener('click', (e) => {
          e.stopPropagation();
          openScheduledRoute(run, route);
        });
    }

    grid.appendChild(div);
  });
}
function renderGrid() {
  const grid = document.getElementById('routesGrid');
  grid.innerHTML = '';

  const filteredRoutes =
    activeSeason === 'all'
      ? routes
      : routes.filter(
          r => (r.season || '').toLowerCase() === activeSeason
        );

  filteredRoutes.forEach(r => {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <h3 class="route-title">${r.name}</h3>
      <p>${r.distance} km</p>
      <div class="map-thumb" id="thumb-${r.id}"></div>
    `;

    // Open detailed route view
    div.addEventListener('click', () => {
      previousSection = 'routes';
      openRoute(r);
    });

    grid.appendChild(div);

    // Wait until element exists in DOM
    requestAnimationFrame(() => {
      const el = document.getElementById(`thumb-${r.id}`);
      if (el) {
        initThumbMap(r);
      }
    });
  });
}
function initThumbMap(route, elementId = `thumb-${route.id}`) {
  const map = L.map(elementId, {
    zoomControl: false,
    attributionControl: false,
    dragging: false,
    scrollWheelZoom: false
  }).setView([53.6, -2.1], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  new L.GPX(route.gpx, {
    async: true,
    polyline_options: { color: 'cyan' }
  }).on('loaded', function(e) {
    map.fitBounds(e.target.getBounds());
  }).addTo(map);
}

function openScheduledRoute(run, route) {
  previousSection = 'schedule';

  openRoute(route);

  document.getElementById('routeInfo').innerText =
    `${route.distance} km · ${run.runningGroup} · ${run.date} ${run.time}`;
}
function openRoute(route) {
  document.getElementById('homeView').style.display = 'none';
  document.getElementById('scheduleView').style.display = 'none';
  document.getElementById('routeView').style.display = 'block';

  // Re-show hidden elements
  document.getElementById('map').style.display = 'block';
  document.getElementById('stravaLink').style.display = 'inline-block';
  document.getElementById('gpxDownload').style.display = 'inline-block';

  document.getElementById('routeName').innerText = route.name;
  document.getElementById('routeInfo').innerText =
    route.distance + ' km';

  document.getElementById('routeDescription').innerText =
    route.description || '';

  document.getElementById('stravaLink').href = route.strava || '#';
  document.getElementById('gpxDownload').href = route.gpx || '';

  setTimeout(() => {
    if (map) map.remove();

    map = L.map('map').setView([53.6, -2.1], 13);

    L.tileLayer(
      'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
    ).addTo(map);

    if (route.gpx) {
      gpxLayer = new L.GPX(route.gpx, {
        async: true,
        polyline_options: { color: 'purple' }
      })
      .on('loaded', function(e) {
        map.fitBounds(e.target.getBounds());
      })
      .addTo(map);
    }

  }, 100);
}
function showSection(section) {
  previousSection = section;

  document.getElementById('homeView').style.display =
    section === 'routes' ? 'block' : 'none';

  document.getElementById('scheduleView').style.display =
    section === 'schedule' ? 'block' : 'none';

  document.getElementById('routeView').style.display = 'none';

  // Rebuild route thumbnails when Routes tab opens
  if (section === 'routes') {
    setTimeout(() => {
      renderGrid();
    }, 50);
  }
}
function showHome() {
  document.getElementById('routeView').style.display = 'none';

  document.getElementById('homeView').style.display =
    previousSection === 'routes' ? 'block' : 'none';

  document.getElementById('scheduleView').style.display =
    previousSection === 'schedule' ? 'block' : 'none';
}
loadRoutes();

function setSeasonFilter(season) {
  activeSeason = season;
  renderGrid();
}
  
</script>

</body>
</html>
